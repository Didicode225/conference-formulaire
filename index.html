<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Conférence ITECHGROUP</title>

    <link rel="stylesheet" href="itechgroup.css">

</head>

<body>

    <h1>
        L'IMPACT DU NUMÉRIQUE ET DES NOUVELLES TECHNOLOGIES SUR LES FILIÈRES CLASSIQUES DE CÔTE D'IVOIRE
    </h1>

    <div id="logos-container">
        <img src="itechgrouplogo.jpeg" alt="Logo ITECHGROUP" class="logo">
        <img src="umecilogo.jpeg" alt="Logo UMECI" class="logo">
    </div>

    <div id="form-container">

        <form>

            <fieldset>

                <legend>INSCRIPTION À LA CONFÉRENCE</legend>

                <label for="nom">Nom</label>
                <input type="text" id="nom" name="nom" placeholder="Votre nom" required>

                <label for="prenom">Prénom</label>
                <input type="text" id="prenom" name="prenom" placeholder="Votre prénom" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Votre email" required>

                <label for="contact">Contact</label>
                <input type="tel" id="contact" name="contact" placeholder="Votre numéro de téléphone" required>

                <label for="filiere">Filière</label>
                <input type="text" id="filiere" name="filiere" placeholder="Votre filière">

                <label for="niveau">Niveau d'études</label>

                <select id="niveau" name="niveau">

                    <option></option>
                    <option>Année Prépa</option>
                    <option>BTS 1</option>
                    <option>BTS 2</option>
                    <option>Licence 1</option>
                    <option>Licence 2</option>
                    <option>Licence 3</option>
                    <option>Master 1</option>
                    <option>Master 2</option>

                </select>

                <label for="motivation">
                    Qu'est-ce qui vous a motivé à participer ?
                </label>

                <textarea id="motivation" name="motivation" rows="4"></textarea>

                <button type="submit">ENVOYER</button>

            </fieldset>

        </form>

        <h3>
            CHOISISSEZ ITECHGROUP POUR UNE INSERTION PROFESSIONNELLE RÉUSSIE
        </h3>

    </div>
    <script src="itechgroup.js"></script>
</body>

</html>
